name: Verify Android keystore secret

# Manually triggered sanity check for the release-signing secrets
# (ANDROID_KEYSTORE_B64 / ANDROID_KEYSTORE_PASSWORD). Run this after
# rotating or first registering the secrets, BEFORE cutting a release:
# it confirms the base64 decodes, the password opens the store, the
# expected key alias exists, and the certificate fingerprint matches the
# canonical upload key. Nothing is built and no secret value is printed.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # SHA-256 fingerprint of the canonical mqvpn upload certificate
  # (public information; also referenced by fdroiddata AllowedAPKSigningKeys).
  EXPECTED_FINGERPRINT: "F1:C5:D8:18:AE:C5:EA:4F:28:7B:44:CE:CC:1E:41:A0:AD:F2:B9:04:C8:EB:12:B3:41:F2:69:4F:BA:AB:B0:42"

jobs:
  verify-keystore:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify keystore secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          fail() { echo "::error::$1"; exit 1; }
          [ -n "$KEYSTORE_B64" ] || fail "ANDROID_KEYSTORE_B64 is not set"
          [ -n "$KEYSTORE_PASSWORD" ] || fail "ANDROID_KEYSTORE_PASSWORD is not set"
          KEYSTORE="$RUNNER_TEMP/verify.jks"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$KEYSTORE" 2>/dev/null \
            || fail "ANDROID_KEYSTORE_B64 is not valid base64"
          keytool -list -keystore "$KEYSTORE" -storepass "$KEYSTORE_PASSWORD" \
            -alias mqvpn-upload 2>/dev/null | grep -q PrivateKeyEntry \
            || fail "keystore does not open with the password, alias 'mqvpn-upload' is missing, or it is not a PrivateKeyEntry"
          # certreq exercises the private key with the key password release.yml
          # will use (store password == key password by PKCS12 convention).
          keytool -certreq -keystore "$KEYSTORE" -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" -alias mqvpn-upload -file /dev/null 2>/dev/null \
            || fail "private key is not usable with the provided password"
          FP=$(keytool -list -v -keystore "$KEYSTORE" -storepass "$KEYSTORE_PASSWORD" \
                 -alias mqvpn-upload 2>/dev/null \
               | sed -n 's/.*SHA256: //p' | head -1)
          [ "$FP" = "$EXPECTED_FINGERPRINT" ] \
            || fail "fingerprint mismatch: got $FP"
          echo "Keystore secrets OK — alias mqvpn-upload, fingerprint matches"
