name: Performance Tests (Weekly)

# Full benchmark suite — runs every Sunday at 3:00 UTC.
# Security: same restrictions as perf.yml (no PR trigger).

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: perf-test
  cancel-in-progress: false

jobs:
  perf-weekly:
    runs-on: perf-test
    timeout-minutes: 120
    steps:
      - name: Pre-checkout cleanup (root-owned files)
        run: sudo rm -rf ci_bench_results bench_results

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cleanup stale state
        run: |
          sudo pkill -f 'mqvpn.*ci-bench' || true
          sudo ip netns del ci-bench-server 2>/dev/null || true
          sudo ip netns del ci-bench-client 2>/dev/null || true
          sudo pkill -f 'iperf3' || true

      - name: Clean previous build
        run: |
          rm -rf third_party/xquic/third_party/boringssl
          rm -rf third_party/xquic/build
          rm -rf build

      - name: Build BoringSSL
        run: |
          git clone https://github.com/google/boringssl.git \
            third_party/xquic/third_party/boringssl
          cd third_party/xquic/third_party/boringssl && git checkout 9c95ec797c65fde9e8ddffc3888f0b8c1460fe4c
          mkdir -p build && cd build
          cmake -DBUILD_SHARED_LIBS=0 -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC" ..
          make -j$(nproc) ssl crypto

      - name: Build xquic
        run: |
          cd third_party/xquic
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DSSL_TYPE=boringssl \
                -DXQC_ENABLE_BBR2=ON \
                -DCMAKE_C_FLAGS="-Wno-dangling-pointer" ..
          make -j$(nproc)

      - name: Build mqvpn (Release)
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DXQUIC_BUILD_DIR=../third_party/xquic/build ..
          make -j$(nproc)

      # --- Core benchmarks (same as push-to-main) ---

      - name: Raw throughput benchmark (TCP DL+UL)
        run: sudo bash scripts/ci_benchmarks/ci_bench_raw_throughput.sh --full build/mqvpn

      - name: Failover benchmark (WLB + MinRTT)
        run: sudo bash scripts/ci_benchmarks/ci_bench_failover.sh build/mqvpn

      - name: Aggregation benchmark (WLB + MinRTT)
        run: sudo bash scripts/ci_benchmarks/ci_bench_aggregate.sh build/mqvpn

      # --- Extended benchmarks (weekly only) ---

      - name: Multipath scheduler benchmark (8 scenarios)
        run: sudo bash scripts/ci_benchmarks/ci_bench_multipath_scheduler.sh build/mqvpn

      - name: Flow scaling benchmark
        run: sudo bash scripts/ci_benchmarks/ci_bench_flow_scaling.sh build/mqvpn

      - name: UDP rate sweep benchmark
        run: sudo bash scripts/ci_benchmarks/ci_bench_udp_sweep.sh build/mqvpn

      - name: NTN satellite benchmark
        run: sudo bash scripts/ci_benchmarks/ci_bench_ntn.sh build/mqvpn

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-weekly-${{ github.sha }}
          path: ci_bench_results/*.json
          retention-days: 90

      - name: Publish results to website
        if: success()
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          mkdir -p website/public/perf-data/weekly
          cp ci_bench_results/*.json website/public/perf-data/weekly/ 2>/dev/null || true

          cd website/public/perf-data/weekly
          python3 -c "
          import json, glob, os
          with open('index.json') as f:
              index = json.load(f)
          existing_files = set()
          for e in index:
              existing_files.update(e.get('files', []))
          new_files = [os.path.basename(f) for f in glob.glob('*.json')
                       if os.path.basename(f) != 'index.json'
                       and os.path.basename(f) not in existing_files]
          if new_files:
              index.insert(0, {
                  'commit': '${COMMIT_SHORT}',
                  'timestamp': '${TIMESTAMP}',
                  'type': 'weekly',
                  'files': new_files
              })
          index = index[:100]
          with open('index.json', 'w') as f:
              json.dump(index, f, indent=2)
          # Remove JSON files not referenced by index
          indexed_files = set()
          for e in index:
              indexed_files.update(e.get('files', []))
          for f in glob.glob('*.json'):
              if f != 'index.json' and f not in indexed_files:
                  os.remove(f)
          "

          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Retry loop: fetch latest, reset, re-add files, commit, push
          push_ok=false
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p website/public/perf-data/weekly
            cp ci_bench_results/*.json website/public/perf-data/weekly/ 2>/dev/null || true

            cd website/public/perf-data/weekly
            python3 -c "
          import json, glob, os
          with open('index.json') as f:
              index = json.load(f)
          existing_files = set()
          for e in index:
              existing_files.update(e.get('files', []))
          new_files = [os.path.basename(f) for f in glob.glob('*.json')
                       if os.path.basename(f) != 'index.json'
                       and os.path.basename(f) not in existing_files]
          if new_files:
              index.insert(0, {
                  'commit': '${COMMIT_SHORT}',
                  'timestamp': '${TIMESTAMP}',
                  'type': 'weekly',
                  'files': new_files
              })
          index = index[:100]
          with open('index.json', 'w') as f:
              json.dump(index, f, indent=2)
          indexed_files = set()
          for e in index:
              indexed_files.update(e.get('files', []))
          for f in glob.glob('*.json'):
              if f != 'index.json' and f not in indexed_files:
                  os.remove(f)
            "
            cd $GITHUB_WORKSPACE

            git add website/public/perf-data/
            git diff --cached --quiet && { push_ok=true; break; }
            git commit -m "perf: update weekly benchmark results (${COMMIT_SHORT}) [skip ci]"
            git push && { push_ok=true; break; }
            echo "Push failed (attempt $attempt), retrying..."
            sleep 5
          done
          if [ "$push_ok" = false ]; then
            echo "::error::Failed to publish weekly benchmark results after 3 attempts"
            exit 1
          fi

      - name: Trigger Cloudflare Pages deploy
        if: success()
        run: curl -sS -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}" || true

      - name: Post-job cleanup (root-owned files)
        if: always()
        run: sudo rm -rf ci_bench_results
