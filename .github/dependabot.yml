version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      website-dev:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      android-deps:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      # Hilt 2.59.x bundles kotlin-metadata-jvm that reads metadata <= 2.3.0,
      # so Kotlin 2.4.x breaks :app:hiltJavaCompileDebug. Remove once a Hilt
      # release supports Kotlin 2.4.
      - dependency-name: "org.jetbrains.kotlin.plugin.*"
        versions: ["[2.4,)"]
