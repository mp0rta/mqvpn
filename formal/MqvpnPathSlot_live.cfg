\* MqvpnPathSlot config B - liveness under finite churn.
\* Churn is bounded (reuse count is intrinsically bounded by MaxIncarnations;
\* resets/abandons by the caps below) so that ~> properties are checked as
\* convergence after churn quiesces rather than defeated by infinite churn.
SPECIFICATION LiveSpec
CONSTANT MaxRetries = 2
CONSTANT MaxIncarnations = 3
CONSTANT MaxXqcIds = 5
CONSTANT ConnResetCap = 1
CONSTANT AbandonCap = 2
PROPERTY DroppedLeadsToFree
PROPERTY RetryEscapes
